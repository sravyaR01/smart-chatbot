<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background"></div>

  <div class="chat-wrapper">
    <div class="chat-container">
      <div class="chat-header">
        <div class="bot-info">
          <div class="bot-avatar">🤖</div>
          <div>
            <h1>Smart Chatbot</h1>
            <p>Online • Ready to help</p>
          </div>
        </div>
        <button id="clear-btn" class="clear-btn">Clear Chat</button>
      </div>

      <div id="chat-box" class="chat-box">
        <div class="message-row bot-row">
          <div class="avatar">🤖</div>
          <div>
            <div class="message bot">
              Hello! I’m your smart chatbot. Ask me about Java, DBMS, HTML, CSS, JavaScript, date, time, and more.
            </div>
            <div class="time">Now</div>
          </div>
        </div>
      </div>

      <div class="suggestions">
        <button class="suggestion">How are you?</button>
        <button class="suggestion">What is Java?</button>
        <button class="suggestion">What is DBMS?</button>
        <button class="suggestion">Show date</button>
      </div>

      <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." />
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
